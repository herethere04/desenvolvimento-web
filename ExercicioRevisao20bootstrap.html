<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="Description" content="Enter your description here"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<title>Revisão BootStrap 20</title>
<style>
    .painel{
        font-weight: bold;
        border-radius: 15px;
        border-top: solid blue 6px;
        margin: 15px;
        padding: 20px;
        box-shadow: rgba(0, 0, 0, 0.12) 0px 1px 3px, rgba(0, 0, 0, 0.24) 0px 1px 2px;
    }


</style>
</head>
<body>
<div class="container-sm mt-4">
    <h1>Exemplo 20 Revisão BootStrap</h1>
    <form action="paginaDestino.aspx" method="get" class="painel mt-5">
        <h3>Cadastro de pessoas</h3>
        <div class="form-group">
            <label for="">CPF</label>
            <input type="text" nome="txtCPF" id="txtCPF" class="form-control">
        </div>
        <div class="form-group">
            <label for="">Nome</label>
            <input type="text" nome="Nome" id="Nome" class="form-control">
        </div>
        <div class="form-group">
            <label for="">Nome da Mãe</label>
            <input type="text" nome="Nome da Mãe" id="Nome da Mãe" class="form-control">
        </div>
        <div class="form-group">
            <label for="">Nome do Pai</label>
            <input type="text" nome="Nome do Pai" id="Nome do Pai" class="form-control">
        </div>
        <div class="form-group">
            <label for="">Data de Nascimento</label>
            <input type="date" nome="Data de Nascimento" id="Data de Nascimento" class="form-control">
        </div>
        <div>
            <div class="d-grid gap-2 mt-4">
                <button class="btn btn-primary" type="button">Cadastrar</button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/js/bootstrap.min.js"></script>
</body>
</html>
