<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Exemplo 21 Revisão Bootstrap</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .painel{
            background:#fff;
            border-radius:8px;
            border-left:6px solid blue;
            padding:20px;
            margin:20px 0;
            box-shadow: rgba(0,0,0,0.12) 0 1px 3px, rgba(0,0,0,0.24) 0 1px 2px;
            font-weight:600;
        }
        .painel h3{ font-weight:700; }
        label{ font-weight:600; font-size:0.95rem; }
    </style>
</head>
<body>
    <div class="container-sm">
        <h1 class="mt-3">Exemplo 21 Revisão Bootstrap - Formulários</h1>

        <div class="painel">
            <h3 class="mb-4">Cadastro de Pessoa</h3>

            <form action="paginaDestino.aspx" method="get">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="txtCPF" class="form-label">CPF</label>
                        <input type="text" id="txtCPF" name="txtCPF" class="form-control" placeholder="000.000.000-00">
                    </div>
                    <div class="col-md-8">
                        <label for="txtNome" class="form-label">Nome</label>
                        <input type="text" id="txtNome" name="txtNome" class="form-control" placeholder="Nome completo">
                    </div>
                    <div class="col-md-6">
                        <label for="txtNomeMae" class="form-label">Nome da Mãe</label>
                        <input type="text" id="txtNomeMae" name="txtNomeMae" class="form-control" placeholder="Nome da mãe">
                    </div>
                    <div class="col-md-6">
                        <label for="txtNomePai" class="form-label">Nome do Pai</label>
                        <input type="text" id="txtNomePai" name="txtNomePai" class="form-control" placeholder="Nome do pai">
                    </div>
                    <div class="col-md-4">
                        <label for="txtDataNascimento" class="form-label">Data de Nascimento</label>
                        <input type="date" id="txtDataNascimento" name="txtDataNascimento" class="form-control">
                    </div>
                    <div class="col-md-8">
                        <label for="txtEmail" class="form-label">e-mail</label>
                        <input type="email" id="txtEmail" name="txtEmail" class="form-control" placeholder="seu@exemplo.com">
                    </div>
                    <div class="col-12">
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/js/bootstrap.min.js"></script>
</body>
</html>
